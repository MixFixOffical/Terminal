<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Банковская система - Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 450px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: linear-gradient(to right, #4a00e0, #8e2de2); color: white; text-align: center; padding: 25px 20px; }
        .header h1 { font-size: 1.8rem; margin-bottom: 5px; }
        .login-container { padding: 30px; }
        .role-selector { display: flex; margin-bottom: 25px; border-radius: 10px; overflow: hidden; border: 2px solid #8e2de2; }
        .role-btn { flex: 1; padding: 12px; border: none; background: white; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .role-btn.active { background: #8e2de2; color: white; }
        .role-btn:hover:not(.active) { background: #f5f5f5; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        input { width: 100%; padding: 12px 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; transition: border 0.3s; }
        input:focus { border-color: #8e2de2; outline: none; box-shadow: 0 0 0 3px rgba(142, 45, 226, 0.1); }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 5px; }
        .btn-primary { background: linear-gradient(to right, #4a00e0, #8e2de2); color: white; }
        .btn-secondary { background: linear-gradient(to right, #00b09b, #96c93d); color: white; }
        .btn-outline { background: transparent; border: 2px solid #8e2de2; color: #8e2de2; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .btn:active { transform: translateY(0); }
        .error { color: #ff416c; font-size: 0.9rem; margin-top: 10px; text-align: center; padding: 10px; background: #fff5f7; border-radius: 5px; }
        .success { color: #00b09b; font-size: 0.9rem; margin-top: 10px; text-align: center; padding: 10px; background: #f0fff4; border-radius: 5px; }
        .footer { text-align: center; padding: 20px; color: #777; font-size: 0.9rem; border-top: 1px solid #eee; }
        .hidden { display: none !important; }
        .mode-switch { text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        .mode-switch button { background: none; border: none; color: #8e2de2; cursor: pointer; font-weight: 600; font-size: 0.95rem; }
        .mode-switch button:hover { text-decoration: underline; }
        .password-container { position: relative; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #666; cursor: pointer; }
        .loading { opacity: 0.7; pointer-events: none; }
        .additional-info { font-size: 0.85rem; color: #666; margin-top: 5px; }
        .test-accounts { margin-top: 25px; padding: 15px; background: #f8f9fa; border-radius: 8px; font-size: 0.85rem; }
        .test-accounts h3 { margin-bottom: 10px; color: #333; }
        .test-account { margin-bottom: 8px; padding: 8px; background: white; border-radius: 5px; border-left: 3px solid #8e2de2; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Банковская система MixFix</h1>
            <p id="mode-title">Вход в систему</p>
        </div>
        
        <div class="login-container">
            <div class="role-selector">
                <button class="role-btn active" id="user-role-btn">Пользователь</button>
                <button class="role-btn" id="admin-role-btn">Администратор</button>
            </div>
            
            <form id="auth-form">
                <div class="form-group">
                    <label for="email">Электронная почта</label>
                    <input type="email" id="email" placeholder="example@mail.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <div class="password-container">
                        <input type="password" id="password" placeholder="Введите пароль" required minlength="6">
                        <button type="button" class="toggle-password" id="toggle-password">👁️</button>
                    </div>
                    <div class="additional-info" id="password-info">Минимум 6 символов</div>
                </div>
                
                <!-- Дополнительные поля для регистрации -->
                <div class="form-group hidden" id="confirm-password-group">
                    <label for="confirm-password">Подтверждение пароля</label>
                    <div class="password-container">
                        <input type="password" id="confirm-password" placeholder="Повторите пароль" minlength="6">
                        <button type="button" class="toggle-password" id="toggle-confirm-password">👁️</button>
                    </div>
                </div>
                
                <div class="form-group hidden" id="name-group">
                    <label for="full-name">ФИО</label>
                    <input type="text" id="full-name" placeholder="Иванов Иван Иванович">
                </div>
                
                <button type="submit" class="btn btn-primary" id="submit-btn">Войти</button>
                <button type="button" class="btn btn-outline" id="switch-mode-btn">Создать аккаунт</button>
                
                <div id="message" class="hidden"></div>
            </form>
            
            <!-- Тестовые аккаунты для демонстрации -->
            <div class="test-accounts">
                <h3>Тестовые аккаунты:</h3>
                <div class="test-account">
                    <strong>Администратор:</strong> admin@mixfix.com / admin123
                </div>
                <div class="test-account">
                    <strong>Пользователь:</strong> user@mixfix.com / user123
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>Система управления © 2024</p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDwxW6rG5Rc2mdMCZ3555j_oMSK1oS2g-s",
            authDomain: "mixfixbank1.firebaseapp.com",
            projectId: "mixfixbank1",
            storageBucket: "mixfixbank1.firebasestorage.app",
            messagingSenderId: "82594956649",
            appId: "1:82594956649:web:bbd6d3b000c1f9001069f8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentRole = 'user';
        let isRegisterMode = false;

        // Инициализация элементов
        const userRoleBtn = document.getElementById('user-role-btn');
        const adminRoleBtn = document.getElementById('admin-role-btn');
        const authForm = document.getElementById('auth-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordGroup = document.getElementById('confirm-password-group');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const nameGroup = document.getElementById('name-group');
        const fullNameInput = document.getElementById('full-name');
        const submitBtn = document.getElementById('submit-btn');
        const switchModeBtn = document.getElementById('switch-mode-btn');
        const modeTitle = document.getElementById('mode-title');
        const messageDiv = document.getElementById('message');
        const togglePasswordBtn = document.getElementById('toggle-password');
        const toggleConfirmPasswordBtn = document.getElementById('toggle-confirm-password');
        const passwordInfo = document.getElementById('password-info');

        // Обработчики событий
        userRoleBtn.addEventListener('click', () => setActiveRole('user'));
        adminRoleBtn.addEventListener('click', () => setActiveRole('admin'));
        switchModeBtn.addEventListener('click', toggleMode);
        togglePasswordBtn.addEventListener('click', () => togglePasswordVisibility('password'));
        toggleConfirmPasswordBtn.addEventListener('click', () => togglePasswordVisibility('confirm-password'));
        
        authForm.addEventListener('submit', handleAuth);
        
        // Создаем тестового пользователя по умолчанию
        createDefaultUsers();

        // Функции
        function setActiveRole(role) {
            currentRole = role;
            userRoleBtn.classList.toggle('active', role === 'user');
            adminRoleBtn.classList.toggle('active', role === 'admin');
            clearMessage();
            
            // Обновляем текст в зависимости от режима
            if (isRegisterMode) {
                updateRegisterButtonText();
            }
        }

        function toggleMode() {
            isRegisterMode = !isRegisterMode;
            updateUI();
        }

        function updateUI() {
            if (isRegisterMode) {
                modeTitle.textContent = 'Регистрация';
                submitBtn.textContent = currentRole === 'user' ? 'Создать пользователя' : 'Создать администратора';
                switchModeBtn.textContent = 'Уже есть аккаунт? Войти';
                
                // Показываем дополнительные поля
                confirmPasswordGroup.classList.remove('hidden');
                nameGroup.classList.remove('hidden');
                passwordInfo.textContent = 'Минимум 6 символов';
                
                // Обновляем требования к паролю
                passwordInput.placeholder = 'Придумайте пароль (мин. 6 символов)';
            } else {
                modeTitle.textContent = 'Вход в систему';
                submitBtn.textContent = 'Войти';
                switchModeBtn.textContent = 'Нет аккаунта? Создать';
                
                // Скрываем дополнительные поля
                confirmPasswordGroup.classList.add('hidden');
                nameGroup.classList.add('hidden');
                passwordInfo.textContent = 'Минимум 6 символов';
                passwordInput.placeholder = 'Введите пароль';
            }
            
            // Очищаем поля и сообщения
            clearForm();
            clearMessage();
        }

        function updateRegisterButtonText() {
            if (isRegisterMode) {
                submitBtn.textContent = currentRole === 'user' ? 'Создать пользователя' : 'Создать администратора';
            }
        }

        function togglePasswordVisibility(fieldId) {
            const field = document.getElementById(fieldId);
            const toggleBtn = fieldId === 'password' ? togglePasswordBtn : toggleConfirmPasswordBtn;
            
            if (field.type === 'password') {
                field.type = 'text';
                toggleBtn.textContent = '🔒';
            } else {
                field.type = 'password';
                toggleBtn.textContent = '👁️';
            }
        }

        async function handleAuth(e) {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const fullName = fullNameInput.value.trim();
            
            // Валидация
            if (!validateInputs(email, password, confirmPassword, fullName)) {
                return;
            }
            
            // Показываем загрузку
            setLoading(true);
            clearMessage();
            
            try {
                if (isRegisterMode) {
                    // Регистрация
                    await handleRegistration(email, password, fullName);
                } else {
                    // Вход
                    await handleLogin(email, password);
                }
            } catch (error) {
                showMessage(error.message, 'error');
            } finally {
                setLoading(false);
            }
        }

        function validateInputs(email, password, confirmPassword, fullName) {
            // Проверка email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('Пожалуйста, введите корректный email', 'error');
                return false;
            }
            
            // Проверка пароля
            if (password.length < 6) {
                showMessage('Пароль должен содержать минимум 6 символов', 'error');
                return false;
            }
            
            // Для регистрации проверяем дополнительные поля
            if (isRegisterMode) {
                if (password !== confirmPassword) {
                    showMessage('Пароли не совпадают', 'error');
                    return false;
                }
                
                if (!fullName || fullName.split(' ').length < 2) {
                    showMessage('Пожалуйста, введите ФИО (имя и фамилию)', 'error');
                    return false;
                }
            }
            
            return true;
        }

        async function handleRegistration(email, password, fullName) {
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Создаем запись в Firestore
                const userData = {
                    email: email,
                    role: currentRole,
                    fullName: fullName,
                    balance: currentRole === 'user' ? 1000 : 0,
                    accounts: currentRole === 'user' ? [] : null,
                    createdAt: new Date().toISOString(),
                    lastLogin: null,
                    isActive: true
                };
                
                await setDoc(doc(db, "users", user.uid), userData);
                
                // Показываем успешное сообщение
                const roleName = currentRole === 'user' ? 'пользователь' : 'администратор';
                showMessage(`Аккаунт успешно создан! Вы зарегистрированы как ${roleName}. Теперь вы можете войти.`, 'success');
                
                // Переключаемся на режим входа
                setTimeout(() => {
                    isRegisterMode = false;
                    updateUI();
                    // Заполняем email для удобства
                    emailInput.value = email;
                }, 2000);
                
            } catch (error) {
                let errorMessage = 'Ошибка при регистрации: ';
                
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage = 'Этот email уже зарегистрирован';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Неверный формат email';
                        break;
                    case 'auth/weak-password':
                        errorMessage = 'Пароль слишком слабый';
                        break;
                    default:
                        errorMessage += error.message;
                }
                
                throw new Error(errorMessage);
            }
        }

        async function handleLogin(email, password) {
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Получаем данные пользователя
                const userDoc = await getDoc(doc(db, "users", user.uid));
                
                if (!userDoc.exists()) {
                    throw new Error('Данные пользователя не найдены');
                }
                
                const userData = userDoc.data();
                
                // Проверяем роль
                if ((currentRole === 'admin' && userData.role !== 'admin') || 
                    (currentRole === 'user' && userData.role !== 'user')) {
                    const currentRoleName = currentRole === 'user' ? 'пользователь' : 'администратор';
                    const actualRoleName = userData.role === 'user' ? 'пользователь' : 'администратор';
                    throw new Error(`Вы пытаетесь войти как ${currentRoleName}, но ваш аккаунт имеет роль ${actualRoleName}`);
                }
                
                // Обновляем время последнего входа
                await setDoc(doc(db, "users", user.uid), {
                    lastLogin: new Date().toISOString()
                }, { merge: true });
                
                // Сохраняем данные в sessionStorage
                sessionStorage.setItem('user', JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    role: userData.role,
                    fullName: userData.fullName || '',
                    balance: userData.balance || 0
                }));
                
                // Перенаправляем на соответствующую страницу
                showMessage('Вход выполнен успешно! Перенаправление...', 'success');
                
                setTimeout(() => {
                    if (userData.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'user.html';
                    }
                }, 1500);
                
            } catch (error) {
                let errorMessage = 'Ошибка при входе: ';
                
                switch (error.code) {
                    case 'auth/invalid-credential':
                        errorMessage = 'Неверный email или пароль';
                        break;
                    case 'auth/user-not-found':
                        errorMessage = 'Пользователь не найден';
                        break;
                    case 'auth/wrong-password':
                        errorMessage = 'Неверный пароль';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = 'Слишком много попыток. Попробуйте позже';
                        break;
                    default:
                        errorMessage += error.message;
                }
                
                throw new Error(errorMessage);
            }
        }

        function showMessage(text, type = 'error') {
            messageDiv.textContent = text;
            messageDiv.className = type;
            messageDiv.classList.remove('hidden');
            
            // Автоматически скрываем успешные сообщения через 5 секунд
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.classList.add('hidden');
                }, 5000);
            }
        }

        function clearMessage() {
            messageDiv.classList.add('hidden');
            messageDiv.textContent = '';
        }

        function clearForm() {
            if (!isRegisterMode) {
                confirmPasswordInput.value = '';
                fullNameInput.value = '';
            }
        }

        function setLoading(isLoading) {
            if (isLoading) {
                submitBtn.classList.add('loading');
                submitBtn.disabled = true;
                switchModeBtn.disabled = true;
                userRoleBtn.disabled = true;
                adminRoleBtn.disabled = true;
            } else {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
                switchModeBtn.disabled = false;
                userRoleBtn.disabled = false;
                adminRoleBtn.disabled = false;
            }
        }

        // Создаем тестовые аккаунты при загрузке
        async function createDefaultUsers() {
            const users = [
                { email: "admin@mixfix.com", password: "admin123", role: "admin", fullName: "Администратор Системы" },
                { email: "user@mixfix.com", password: "user123", role: "user", fullName: "Тестовый Пользователь" }
            ];
            
            for (const user of users) {
                try {
                    // Пробуем создать пользователя
                    const userCredential = await createUserWithEmailAndPassword(auth, user.email, user.password);
                    
                    // Создаем запись в Firestore
                    await setDoc(doc(db, "users", userCredential.user.uid), {
                        email: user.email,
                        role: user.role,
                        fullName: user.fullName,
                        balance: user.role === 'user' ? 5000 : 0,
                        createdAt: new Date().toISOString(),
                        lastLogin: null,
                        isActive: true
                    });
                    
                    console.log(`Тестовый пользователь создан: ${user.email}`);
                } catch (error) {
                    // Игнорируем ошибку "email уже используется"
                    if (error.code !== 'auth/email-already-in-use') {
                        console.error(`Ошибка создания пользователя ${user.email}:`, error);
                    }
                }
            }
        }

        // Инициализация интерфейса
        updateUI();
    </script>
</body>
</html>
